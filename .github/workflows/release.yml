name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build and release binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Build binaries
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          LDFLAGS="-s -w -X main.version=${VERSION}"
          NAME="mochi-card-mcp"
          mkdir -p dist build

          # Each target is "GOOS GOARCH label".
          targets=(
            "darwin amd64 macos-intel"
            "darwin arm64 macos-arm64"
            "linux amd64 linux-amd64"
            "linux arm64 linux-arm64"
            "windows amd64 windows-amd64"
          )

          for target in "${targets[@]}"; do
            read -r goos goarch label <<< "$target"
            ext=""
            if [ "$goos" = "windows" ]; then ext=".exe"; fi
            out="build/${NAME}${ext}"
            echo "Building ${goos}/${goarch} -> ${label}"
            GOOS="$goos" GOARCH="$goarch" CGO_ENABLED=0 \
              go build -trimpath -ldflags "$LDFLAGS" -o "$out" .

            archive="dist/${NAME}_${VERSION}_${label}"
            if [ "$goos" = "windows" ]; then
              zip -j "${archive}.zip" "$out" README.md LICENSE
            else
              tar -czf "${archive}.tar.gz" -C build "${NAME}${ext}" -C "$GITHUB_WORKSPACE" README.md LICENSE
            fi
            rm -f "$out"
          done

          (cd dist && sha256sum * > checksums.txt)
          ls -la dist

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            dist/*
